name: LeetCode Stats

on:
  workflow_dispatch:
  schedule:
    # Runs every 5 minutes
    - cron: "*/5 * * * *"
  push:
    branches:
      - master
      - main

jobs:
  update-leetcode-stats:
    name: Update LeetCode Stats Card
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch LeetCode stats and generate SVG card
        run: |
          set -e

          # Fetch data from LeetCode Stats API with retry
          echo "Fetching LeetCode stats..."
          RESPONSE=""
          for i in 1 2 3; do
            RESPONSE=$(curl -s --max-time 30 "https://leetcode-stats-api.herokuapp.com/tranduclong-se")
            # Check if response looks like JSON
            if echo "$RESPONSE" | jq empty 2>/dev/null; then
              echo "Got valid JSON on attempt $i"
              break
            else
              echo "Attempt $i failed, response is not valid JSON:"
              echo "$RESPONSE" | head -5
              RESPONSE=""
              sleep 5
            fi
          done

          if [ -z "$RESPONSE" ]; then
            echo "All attempts failed, skipping update."
            exit 0
          fi

          # Check if API returned success
          STATUS=$(echo "$RESPONSE" | jq -r '.status')
          if [ "$STATUS" != "success" ]; then
            echo "API returned status: $STATUS, skipping update."
            exit 0
          fi

          # Parse JSON response
          TOTAL_SOLVED=$(echo "$RESPONSE" | jq -r '.totalSolved')
          TOTAL_QUESTIONS=$(echo "$RESPONSE" | jq -r '.totalQuestions')
          EASY_SOLVED=$(echo "$RESPONSE" | jq -r '.easySolved')
          TOTAL_EASY=$(echo "$RESPONSE" | jq -r '.totalEasy')
          MEDIUM_SOLVED=$(echo "$RESPONSE" | jq -r '.mediumSolved')
          TOTAL_MEDIUM=$(echo "$RESPONSE" | jq -r '.totalMedium')
          HARD_SOLVED=$(echo "$RESPONSE" | jq -r '.hardSolved')
          TOTAL_HARD=$(echo "$RESPONSE" | jq -r '.totalHard')

          echo "Data: Easy=$EASY_SOLVED/$TOTAL_EASY, Medium=$MEDIUM_SOLVED/$TOTAL_MEDIUM, Hard=$HARD_SOLVED/$TOTAL_HARD, Total=$TOTAL_SOLVED"

          # Calculate donut chart arcs (circumference = 2*PI*45 ≈ 282.74)
          CIRC="282.74"
          EASY_ARC=$(awk "BEGIN {printf \"%.2f\", ($EASY_SOLVED/$TOTAL_QUESTIONS)*$CIRC}")
          MED_ARC=$(awk "BEGIN {printf \"%.2f\", ($MEDIUM_SOLVED/$TOTAL_QUESTIONS)*$CIRC}")
          HARD_ARC=$(awk "BEGIN {printf \"%.2f\", ($HARD_SOLVED/$TOTAL_QUESTIONS)*$CIRC}")

          # Offsets for stacked donut
          MED_OFFSET=$(awk "BEGIN {printf \"%.2f\", -($EASY_ARC)}")
          HARD_OFFSET=$(awk "BEGIN {printf \"%.2f\", -($EASY_ARC + $MED_ARC)}")

          # Progress bar widths (max 160px)
          EASY_BAR=$(awk "BEGIN {v=int(($EASY_SOLVED/$TOTAL_EASY)*160); if(v<2 && $EASY_SOLVED>0) v=2; printf \"%d\", v}")
          MED_BAR=$(awk "BEGIN {v=int(($MEDIUM_SOLVED/$TOTAL_MEDIUM)*160); if(v<2 && $MEDIUM_SOLVED>0) v=2; printf \"%d\", v}")
          HARD_BAR=$(awk "BEGIN {v=int(($HARD_SOLVED/$TOTAL_HARD)*160); if(v<2 && $HARD_SOLVED>0) v=2; printf \"%d\", v}")

          # X position for "/total" text (after bold number)
          EASY_TX=$(awk "BEGIN {printf \"%d\", 240 + length(\"$EASY_SOLVED\") * 10 + 2}")
          MED_TX=$(awk "BEGIN {printf \"%d\", 240 + length(\"$MEDIUM_SOLVED\") * 10 + 2}")
          HARD_TX=$(awk "BEGIN {printf \"%d\", 240 + length(\"$HARD_SOLVED\") * 10 + 2}")

          # Write SVG directly
          cat > leetcode-card.svg << EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="500" height="200" viewBox="0 0 500 200">
            <defs>
              <style>
                .card-bg { fill: #1a1a2e; }
                .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; font-weight: 600; fill: #e0e0e0; }
                .total-num { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 28px; font-weight: 700; fill: #ffffff; }
                .total-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; fill: #8a8a8a; }
                .label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; fill: #b0b0b0; }
                .count-bold { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 16px; font-weight: 700; fill: #ffffff; }
                .count-total { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; fill: #8a8a8a; }
                .bar-bg { fill: #3a3a3a; }
                .ring-bg { fill: none; stroke: #3a3a3a; stroke-width: 8; }
                .ring-easy { fill: none; stroke: #00b8a3; stroke-width: 8; stroke-linecap: round; }
                .ring-medium { fill: none; stroke: #ffc01e; stroke-width: 8; stroke-linecap: round; }
                .ring-hard { fill: none; stroke: #ef4743; stroke-width: 8; stroke-linecap: round; }
              </style>
            </defs>
            <rect class="card-bg" width="500" height="200" rx="12"/>
            <text class="title" x="24" y="30">Solved Problems</text>
            <circle class="ring-bg" cx="90" cy="115" r="45"/>
            <circle class="ring-easy" cx="90" cy="115" r="45" stroke-dasharray="${EASY_ARC} ${CIRC}" stroke-dashoffset="0" transform="rotate(-90 90 115)"/>
            <circle class="ring-medium" cx="90" cy="115" r="45" stroke-dasharray="${MED_ARC} ${CIRC}" stroke-dashoffset="${MED_OFFSET}" transform="rotate(-90 90 115)"/>
            <circle class="ring-hard" cx="90" cy="115" r="45" stroke-dasharray="${HARD_ARC} ${CIRC}" stroke-dashoffset="${HARD_OFFSET}" transform="rotate(-90 90 115)"/>
            <text class="total-num" x="90" y="120" text-anchor="middle">${TOTAL_SOLVED}</text>
            <text class="total-label" x="90" y="137" text-anchor="middle">Solved</text>
            <text class="label" x="175" y="70">Easy</text>
            <text class="count-bold" x="240" y="70">${EASY_SOLVED}</text>
            <text class="count-total" x="${EASY_TX}" y="70">/${TOTAL_EASY}</text>
            <rect class="bar-bg" x="310" y="59" width="160" height="8" rx="4"/>
            <rect fill="#00b8a3" x="310" y="59" width="${EASY_BAR}" height="8" rx="4"/>
            <text class="label" x="175" y="115">Medium</text>
            <text class="count-bold" x="240" y="115">${MEDIUM_SOLVED}</text>
            <text class="count-total" x="${MED_TX}" y="115">/${TOTAL_MEDIUM}</text>
            <rect class="bar-bg" x="310" y="104" width="160" height="8" rx="4"/>
            <rect fill="#ffc01e" x="310" y="104" width="${MED_BAR}" height="8" rx="4"/>
            <text class="label" x="175" y="160">Hard</text>
            <text class="count-bold" x="240" y="160">${HARD_SOLVED}</text>
            <text class="count-total" x="${HARD_TX}" y="160">/${TOTAL_HARD}</text>
            <rect class="bar-bg" x="310" y="149" width="160" height="8" rx="4"/>
            <rect fill="#ef4743" x="310" y="149" width="${HARD_BAR}" height="8" rx="4"/>
          </svg>
          EOF

          # Remove heredoc indentation
          sed -i 's/^          //' leetcode-card.svg

          echo "SVG card generated successfully!"

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git diff --quiet || (git add leetcode-card.svg && git commit -m "📊 Update LeetCode stats card" && git push)
